    function todayIso() {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    }

    function calcBlockStatus(block) {
      if (!block) return "pending";
      const n = block.exercises.length;
      const done = block.exercises.filter(e => e.completed).length;
      if (done === 0) return "skipped";
      if (done === n) return "complete";
      return "partial";
    }

    function dayState(day, dateKey, today) {
      const blocks = Object.values(day.blocks);
      const statuses = blocks.map(b => b.status);
      const allComplete = statuses.length > 0 && statuses.every(s => s === "complete");
      const anySaved = statuses.some(s => s && s !== "pending");
      const isRest = "rest" in day.blocks;
      if (allComplete) return "completed";
      if (anySaved) return "partial";
      if (dateKey === today) return "today";
      if (isRest) return "rest";
      if (dateKey < today) return "missed";
      return "pending";
    }

    function computeKPIs(plan) {
      const dayKeys = Object.keys(plan.days);
      let trainingDone = 0;
      const kneeAfter = [];
      const backAfter = [];
      for (const k of dayKeys) {
        const d = plan.days[k];
        const isRest = "rest" in d.blocks;
        if (!isRest) {
          const s = Object.values(d.blocks).map(b => b.status);
          if (s.length > 0 && s.every(x => x === "complete")) trainingDone++;
        }
        if (d.pain?.knee_after != null) kneeAfter.push(Number(d.pain.knee_after));
        if (d.pain?.back_after != null) backAfter.push(Number(d.pain.back_after));
      }
      const avg = (arr) => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : "—";
      return {
        training: trainingDone + "/6",
        macros: "0/7",
        kneePain: avg(kneeAfter),
        backPain: avg(backAfter)
      };
    }

    function weekProgressPct(plan) {
      const dayKeys = Object.keys(plan.days);
      let totalBlocks = 0, completeBlocks = 0;
      for (const k of dayKeys) {
        for (const b of Object.values(plan.days[k].blocks)) {
          totalBlocks++;
          if (b.status === "complete") completeBlocks++;
        }
      }
      return totalBlocks ? Math.round(100 * completeBlocks / totalBlocks) : 0;
    }

        <div className="px-4 pt-3 sticky top-0 z-0 bg-white dark:bg-gray-950">
          <div className="grid grid-cols-2 gap-1 p-1 rounded-xl bg-gray-100 dark:bg-gray-900">
            {tabs.map(t => {
              const isActive = t.id === active;
              return (
                <button
                  key={t.id}
                  onClick={() => onChange(t.id)}
                  className={"min-h-[40px] text-sm font-medium rounded-lg transition " + (isActive ? "bg-white dark:bg-gray-800 shadow-sm text-gray-900 dark:text-gray-100" : "text-gray-500 dark:text-gray-400")}
                >{t.label}</button>
              );
            })}
          </div>
        </div>
      );
    }

    function DayChip({ dateKey, day, state, selected, onClick }) {
      const label = day.day_name.slice(0, 3);
      const dayNum = dateKey.slice(-2);
      const cls = {
        completed: "bg-emerald-100 text-emerald-800 border-emerald-300 dark:bg-emerald-950 dark:text-emerald-300 dark:border-emerald-800",
        partial:   "bg-amber-100 text-amber-800 border-amber-300 dark:bg-amber-950 dark:text-amber-300 dark:border-amber-800",
        today:     "bg-purple-100 text-purple-800 border-purple-300 dark:bg-purple-950 dark:text-purple-300 dark:border-purple-800",
        missed:    "bg-red-50 text-red-700 border-red-200 dark:bg-red-950 dark:text-red-300 dark:border-red-900",
        rest:      "bg-gray-50 text-gray-500 border-gray-200 dark:bg-gray-900 dark:text-gray-500 dark:border-gray-800 italic",
        pending:   "bg-white text-gray-600 border-gray-200 dark:bg-gray-900 dark:text-gray-400 dark:border-gray-800"
      }[state];
      const ring = selected ? " ring-2 ring-offset-1 ring-purple-500 dark:ring-offset-gray-950" : "";
      return (
        <button
          onClick={onClick}
          className={"flex flex-col items-center justify-center min-w-[44px] min-h-[56px] px-2 py-1 rounded-lg border text-xs " + cls + ring}
        >
          <span className="font-medium uppercase tracking-wide text-[10px]">{label}</span>
          <span className="text-sm font-semibold tabular-nums">{dayNum}</span>
        </button>
      );
    }

    function ExerciseRow({ ex, onToggle }) {
      const cat = CATEGORIES[ex.category] || { label: ex.category, cls: "bg-gray-100 text-gray-700" };
      return (
        <label className="flex items-start gap-3 py-2 cursor-pointer active:bg-gray-50 dark:active:bg-gray-900 -mx-3 px-3 rounded-lg">
          <input
            type="checkbox"
            checked={!!ex.completed}
            onChange={() => onToggle(ex.id)}
            className="w-5 h-5 mt-0.5 accent-emerald-600 flex-shrink-0"
          />
          <div className="flex-1 min-w-0">
            <div className="flex items-start justify-between gap-2">
              <div className={"text-sm leading-snug " + (ex.completed ? "line-through text-gray-400 dark:text-gray-600" : "text-gray-900 dark:text-gray-100")}>
                {ex.name}
                {ex.timing && <span className="ml-1.5 text-[10px] font-medium px-1.5 py-0.5 rounded bg-purple-50 text-purple-700 dark:bg-purple-950 dark:text-purple-300 align-middle">{ex.timing}</span>}
              </div>
            </div>
            <div className="flex items-center gap-2 flex-wrap mt-1">
              <span className={"text-[10px] font-medium px-1.5 py-0.5 rounded " + cat.cls}>{cat.label}</span>
              <span className="text-xs text-gray-500 dark:text-gray-400 tabular-nums">{ex.prescription}</span>
            </div>
            {ex.reference_url && (
              <a
                href={ex.reference_url}
                target="_blank"
                rel="noopener"
                onClick={(e) => e.stopPropagation()}
                className="inline-flex items-center gap-1 text-[11px] text-purple-700 dark:text-purple-400 mt-1 hover:underline"
              >
                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                Ver referencia
              </a>
            )}
          </div>
        </label>
      );
    }

    function PainInput({ pain, onChange, disabled }) {
      const field = (label, key, value) => (
        <div className="flex flex-col">
          <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400 mb-0.5">{label}</label>
          <input
            type="number"
            inputMode="numeric"
            min="0" max="10" step="1"
            value={value ?? ""}
            disabled={disabled}
            onChange={(e) => onChange(key, e.target.value === "" ? null : Math.max(0, Math.min(10, Number(e.target.value))))}
            className="w-full h-10 text-center tabular-nums text-base rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 disabled:opacity-50"
            placeholder="—"
          />
        </div>
      );
      return (
        <div className="rounded-xl border border-gray-200 dark:border-gray-800 p-3 bg-white dark:bg-gray-900">
          <div className="text-xs font-medium text-gray-700 dark:text-gray-300 mb-2">Dolor (0-10)</div>
          <div className="space-y-2">
            <div>
              <div className="text-[11px] text-gray-500 dark:text-gray-400 mb-1">Rodilla derecha</div>
              <div className="grid grid-cols-2 gap-2">
                {field("Antes", "knee_before", pain.knee_before)}
                {field("Después", "knee_after", pain.knee_after)}
              </div>
            </div>
            <div>
              <div className="text-[11px] text-gray-500 dark:text-gray-400 mb-1">Lumbar</div>
              <div className="grid grid-cols-2 gap-2">
                {field("Antes", "back_before", pain.back_before)}
                {field("Después", "back_after", pain.back_after)}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function BlockCard({ blockKey, block, onToggle, onSave, expanded, onToggleExpand }) {
      const status = block.status;
      const total = block.exercises.length;
      const done = block.exercises.filter(e => e.completed).length;
      const savedAt = block.saved_at ? new Date(block.saved_at) : null;

      const statusPill = {
        complete: { cls: "bg-emerald-100 text-emerald-800 dark:bg-emerald-950 dark:text-emerald-300", label: "Completo" },
        partial:  { cls: "bg-amber-100 text-amber-800 dark:bg-amber-950 dark:text-amber-300", label: "Parcial" },
        skipped:  { cls: "bg-red-100 text-red-800 dark:bg-red-950 dark:text-red-300", label: "Saltado" },
        pending:  { cls: "bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400", label: "Pendiente" }
      }[status];

      const titleByKey = { am: "AM", pm: "PM", rest: "Rest" };

      return (
        <div className="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 overflow-hidden">
          <button
            onClick={onToggleExpand}
            className="w-full flex items-center justify-between gap-2 p-3 min-h-[56px] active:bg-gray-50 dark:active:bg-gray-800"
          >
            <div className="flex items-center gap-2 min-w-0">
              <span className="text-xs font-semibold px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-800 uppercase">{titleByKey[blockKey] || blockKey}</span>
              <span className="text-sm truncate">{block.label}</span>
            </div>
            <div className="flex items-center gap-2 flex-shrink-0">
              <span className="text-xs text-gray-500 dark:text-gray-400 tabular-nums">{done}/{total}</span>
              <span className={"text-[10px] font-medium px-1.5 py-0.5 rounded " + statusPill.cls}>{statusPill.label}</span>
              <svg className={"w-4 h-4 text-gray-400 transition-transform " + (expanded ? "rotate-180" : "")} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
            </div>
          </button>
          {expanded && (
            <div className="px-3 pb-3 border-t border-gray-100 dark:border-gray-800">
              <div className="divide-y divide-gray-100 dark:divide-gray-800">
                {block.exercises.map(ex => (
                  <ExerciseRow key={ex.id} ex={ex} onToggle={(id) => onToggle(blockKey, id)} />
                ))}
              </div>
              <button
                onClick={() => onSave(blockKey)}
                className="w-full mt-3 min-h-[44px] rounded-xl bg-emerald-600 text-white text-sm font-medium active:bg-emerald-700"
              >
                Guardar bloque {titleByKey[blockKey] || blockKey}
              </button>
              {savedAt && (
                <div className="text-[10px] text-gray-500 dark:text-gray-400 text-center mt-1.5">
                  Guardado {savedAt.toLocaleString("es-PE", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function DayPlan({ plan, selectedDate, onSelectDay, onToggleExercise, onSaveBlock, onPainChange }) {
      const today = todayIso();
      const day = plan.days[selectedDate];
      const [expanded, setExpanded] = useState(() => {
        const init = {};
        Object.keys(day.blocks).forEach(k => init[k] = true);
        return init;
      });

      // Re-sync expanded state when date changes
      useEffect(() => {
        const init = {};
        Object.keys(plan.days[selectedDate].blocks).forEach(k => init[k] = true);
        setExpanded(init);
      }, [selectedDate]);

      const toggleExpand = (k) => setExpanded(s => ({ ...s, [k]: !s[k] }));
      const anyBlockSaved = Object.values(day.blocks).some(b => b.saved_at);

      return (
        <div className="px-4 py-3 space-y-3">
          {/* Day chips — horizontal scroll */}
          <div className="-mx-4 px-4 overflow-x-auto scrollbar-hide">
            <div className="flex gap-2 pb-1">
              {Object.entries(plan.days).map(([dateKey, d]) => (
                <DayChip
                  key={dateKey}
                  dateKey={dateKey}
                  day={d}
                  state={dayState(d, dateKey, today)}
                  selected={dateKey === selectedDate}
                  onClick={() => onSelectDay(dateKey)}
                />
              ))}
            </div>
          </div>

          {/* Pain input */}
          <PainInput pain={day.pain} onChange={onPainChange} />
          {!anyBlockSaved && (
            <div className="text-[11px] text-gray-500 dark:text-gray-400 -mt-1.5 px-1">
              Registra el dolor al guardar el primer bloque.
            </div>
          )}

          {/* Blocks */}
          <div className="space-y-2">
            {Object.entries(day.blocks).map(([k, block]) => (
              <BlockCard
                key={k}
                blockKey={k}
                block={block}
                onToggle={onToggleExercise}
                onSave={onSaveBlock}
                expanded={!!expanded[k]}
                onToggleExpand={() => toggleExpand(k)}
              />
            ))}
          </div>
        </div>
      );
    }

    function WeekSummary({ plan }) {
      return (
        <div className="px-4 py-3">
          <h3 className="text-sm font-semibold mb-2 text-gray-900 dark:text-gray-100">Resumen semanal</h3>
          <div className="rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden bg-white dark:bg-gray-900">
            <table className="w-full text-xs">
              <thead className="bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-400">
                <tr>
                  <th className="text-left px-2 py-2 font-medium">Día</th>
                  <th className="text-center px-1 py-2 font-medium">AM</th>
                  <th className="text-center px-1 py-2 font-medium">PM</th>
                  <th className="text-center px-2 py-2 font-medium">Dolor R/L</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-100 dark:divide-gray-800">
                {Object.entries(plan.days).map(([dateKey, d]) => {
                  const isRest = "rest" in d.blocks;
                  const am = d.blocks.am || d.blocks.rest;
                  const pm = d.blocks.pm;
                  const kA = d.pain?.knee_after, bA = d.pain?.back_after;
                  return (
                    <tr key={dateKey}>
                      <td className="px-2 py-2">
                        <div className="font-medium text-gray-900 dark:text-gray-100">{d.day_name.slice(0,3)}</div>
                        <div className="text-[10px] text-gray-500 dark:text-gray-400 tabular-nums">{dateKey.slice(-2)}</div>
                      </td>
                      <td className="text-center px-1 py-2">{statusDot(am?.status)}</td>
                      <td className="text-center px-1 py-2">{isRest ? <span className="text-gray-400 italic">—</span> : statusDot(pm?.status)}</td>
                      <td className="text-center px-2 py-2 tabular-nums text-gray-700 dark:text-gray-300">
                        {kA != null || bA != null ? `${kA ?? "—"}/${bA ?? "—"}` : <span className="text-gray-400">—</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function statusDot(status) {
      const cls = {
        complete: "bg-emerald-500",
        partial:  "bg-amber-500",
        skipped:  "bg-red-500",
        pending:  "bg-gray-300 dark:bg-gray-700"
      }[status || "pending"];
      return <span className={"inline-block w-2.5 h-2.5 rounded-full " + cls} />;
    }

    function Timeline({ config }) {
      const phases = config.phase_rules.phases;
      const current = config.phase_rules.current_phase;
      return (
        <div className="px-4 pt-3 pb-6">
          <h3 className="text-sm font-semibold mb-2 text-gray-900 dark:text-gray-100">Timeline</h3>
          <div className="space-y-2">
            {phases.map(p => {
              const isCurrent = p.id === current;
              const isPast = p.id < current;
              return (
                <div
                  key={p.id}
                  className={"rounded-xl border p-3 " + (isCurrent
                    ? "border-purple-300 bg-purple-50 dark:border-purple-800 dark:bg-purple-950/40"
                    : isPast
                      ? "border-gray-200 bg-gray-50 dark:border-gray-800 dark:bg-gray-900 opacity-60"
                      : "border-gray-200 bg-white dark:border-gray-800 dark:bg-gray-900")}
                >
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0">
                      <div className="flex items-center gap-2">
                        <span className="text-xs font-semibold text-gray-500 dark:text-gray-400">Fase {p.id}</span>
                        {isCurrent && (
                          <span className="text-[10px] font-medium px-1.5 py-0.5 rounded bg-purple-200 text-purple-900 dark:bg-purple-800 dark:text-purple-100">
                            Estás aquí
                          </span>
                        )}
                      </div>
                      <div className="text-sm font-medium mt-0.5">{p.name}</div>
                      <div className="text-[11px] text-gray-500 dark:text-gray-400 mt-0.5">Sem {p.weeks} · {p.dates}</div>
                    </div>
                  </div>
                  {isCurrent && p.criteria && (
                    <div className="mt-2 text-[11px] text-gray-700 dark:text-gray-300">
                      <span className="font-medium">Criterio avance:</span> {p.criteria}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function NutritionPlaceholder() {
      return (
        <div className="px-4 py-8 text-center">
          <div className="text-4xl mb-3">🥗</div>
          <div className="text-sm font-medium text-gray-900 dark:text-gray-100">Nutrición</div>
          <div className="text-xs text-gray-500 dark:text-gray-400 mt-1">Disponible en Release 2</div>
        </div>
      );
    }

    // -------------------- APP --------------------
    function App() {
      const [loaded, setLoaded] = useState(false);
      const [config, setConfig] = useState(null);
      const [plan, setPlan] = useState(null);
      const [activeTab, setActiveTab] = useState("entreno");
      const [selectedDate, setSelectedDate] = useState(null);

      // Load on mount
      useEffect(() => {
        (async () => {
          let c = await window.storage.get("config");
          let p = await window.storage.get("active-plan");
          let h = await window.storage.get("history");
          if (!c) { c = DEFAULT_CONFIG; await window.storage.set("config", c); }
          if (!p) { p = DEFAULT_PLAN; await window.storage.set("active-plan", p); }
          if (!h) { h = DEFAULT_HISTORY; await window.storage.set("history", h); }
          setConfig(c);
          setPlan(p);
          // Default selected day: today if in plan, else start_date
          const today = todayIso();
          setSelectedDate(p.days[today] ? today : p.start_date);
          setLoaded(true);
        })();
      }, []);

      const persistPlan = useCallback(async (next) => {
        setPlan(next);
        await window.storage.set("active-plan", next);
      }, []);

      const toggleExercise = useCallback((blockKey, exId) => {
        const next = structuredClone(plan);
        const block = next.days[selectedDate].blocks[blockKey];
        const ex = block.exercises.find(e => e.id === exId);
        ex.completed = !ex.completed;
        // Don't persist on every toggle — only on save
        setPlan(next);
      }, [plan, selectedDate]);

      const saveBlock = useCallback((blockKey) => {
        const next = structuredClone(plan);
        const block = next.days[selectedDate].blocks[blockKey];
        block.status = calcBlockStatus(block);
        block.saved_at = new Date().toISOString();
        persistPlan(next);
      }, [plan, selectedDate, persistPlan]);

      const painChange = useCallback((key, value) => {
        const next = structuredClone(plan);
        next.days[selectedDate].pain[key] = value;
        persistPlan(next);
      }, [plan, selectedDate, persistPlan]);

      if (!loaded) {
        return <div className="p-8 text-center text-sm text-gray-500">Cargando…</div>;
      }

      const kpis = computeKPIs(plan);
      const progress = weekProgressPct(plan);

      return (
        <div className="max-w-[480px] mx-auto pb-10">
          <Header plan={plan} kpis={kpis} progress={progress} />
          <ChatBar />
          <TabBar active={activeTab} onChange={setActiveTab} />

          {activeTab === "entreno" ? (
            <>
              <DayPlan
                plan={plan}
                selectedDate={selectedDate}
                onSelectDay={setSelectedDate}
                onToggleExercise={toggleExercise}
                onSaveBlock={saveBlock}
                onPainChange={painChange}
              />
              <WeekSummary plan={plan} />
              <Timeline config={config} />
              <ResetFooter onReset={async () => {
                if (confirm("¿Borrar todos los datos y empezar de cero?")) {
                  await window.storage.delete("config");
                  await window.storage.delete("active-plan");
                  await window.storage.delete("history");
                  location.reload();
                }
              }} />
            </>
          ) : (
            <NutritionPlaceholder />
          )}
        </div>
      );
    }

    function ResetFooter({ onReset }) {
      return (
        <div className="px-4 pt-2 pb-6">
          <button
            onClick={onReset}
            className="w-full min-h-[36px] text-[11px] text-gray-400 dark:text-gray-600 hover:text-red-600 dark:hover:text-red-400"
          >Reiniciar datos</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
