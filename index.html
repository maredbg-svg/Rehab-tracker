    function todayIso() {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
    }

    function calcBlockStatus(block) {
      if (!block) return "pending";
      const planned = block.exercises.filter(e => !e.custom);
      if (planned.length === 0) return "skipped";
      const done = planned.filter(e => e.completed).length;
      if (done === 0) return "skipped";
      if (done === planned.length) return "complete";
      return "partial";
    }

    function countPlannedVsCustom(block) {
      const planned = block.exercises.filter(e => !e.custom);
      const customDone = block.exercises.filter(e => e.custom && e.completed).length;
      const plannedDone = planned.filter(e => e.completed).length;
      return { plannedDone, plannedTotal: planned.length, customDone };
    }

    function ensureNutrition(day) {
      if (!day.nutrition) {
        day.nutrition = { meals: [], movement: { active_kcal: null, steps: null } };
      }
      if (!Array.isArray(day.nutrition.meals)) day.nutrition.meals = [];
      if (!day.nutrition.movement) day.nutrition.movement = { active_kcal: null, steps: null };
      return day.nutrition;
    }

    function sumMealsDay(day) {
      const meals = day?.nutrition?.meals || [];
      return meals.reduce((acc, m) => ({
        calories: acc.calories + (Number(m.calories) || 0),
        protein_g: acc.protein_g + (Number(m.protein_g) || 0),
        carbs_g: acc.carbs_g + (Number(m.carbs_g) || 0),
        fat_g: acc.fat_g + (Number(m.fat_g) || 0)
      }), { calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0 });
    }

    function computeDayTarget(profile, day) {
      const bmr = mifflinStJeor(profile || {}).bmr;
      const active = day?.nutrition?.movement?.active_kcal;
      const hasActive = active !== null && active !== undefined && active !== "";
      const activeNum = hasActive ? Number(active) : 0;
      const baseline = Math.round(bmr * 1.2);
      const burn = hasActive ? bmr + activeNum : baseline;
      const adjust = Number(profile?.goal_kcal_adjustment ?? -350);
      const target = Math.max(1200, burn + adjust); // safety floor
      return { bmr, active: activeNum, hasActive, baseline, burn, adjust, target };
    }

    function computeMacrosWeekKPI(plan, config) {
      const targetProt = Number(config?.profile?.protein_daily_g) || 160;
      let cumplidos = 0;
      const totalDays = Object.keys(plan.days).length;
      for (const d of Object.values(plan.days)) {
        const totals = sumMealsDay(d);
        const { target } = computeDayTarget(config?.profile, d);
        if (totals.calories >= 0.85 * target && totals.protein_g >= 0.85 * targetProt) cumplidos++;
      }
      return cumplidos + "/" + totalDays;
    }

    function mifflinStJeor(profile) {
      const w = Number(profile.weight_kg) || 70;
      const h = Number(profile.height_cm) || 170;
      const a = Number(profile.age) || 30;
      const bmr = 10 * w + 6.25 * h - 5 * a + 5; // male
      const maintenance = bmr * 1.45; // light activity + rehab
      const cut = Math.round(maintenance - 350); // gentle cut for fat loss
      return { bmr: Math.round(bmr), maintenance: Math.round(maintenance), cut };
    }

    function shiftDateKey(dateStr, deltaDays) {
      const [y, m, d] = dateStr.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      dt.setDate(dt.getDate() + deltaDays);
      return dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0") + "-" + String(dt.getDate()).padStart(2,"0");
    }

    function migratePlanDates(plan) {
      // Bug fix: original plan had 2026-04-21 labeled "Lunes" but it's actually Tuesday.
      // Shift all dates back 1 day so "Lunes" = 2026-04-20 (the real Monday).
      if (plan?.days?.["2026-04-21"]?.day_name === "Lunes" && plan?.start_date === "2026-04-21") {
        const newDays = {};
        for (const [k, v] of Object.entries(plan.days)) {
          newDays[shiftDateKey(k, -1)] = v;
        }
        plan.days = newDays;
        plan.start_date = shiftDateKey(plan.start_date, -1);
        plan.end_date = shiftDateKey(plan.end_date, -1);
        return true;
      }
      return false;
    }

    function parsePrescriptionDefaults(text) {
      // Best-effort parse "4 × 10 — 22 kg" or "4x10" or "3 × 12 — 15RM"
      if (!text) return { sets: null, reps: "", weight: "" };
      const setsReps = text.match(/(\d+)\s*[x×]\s*([0-9]+(?:[-0-9]*)?(?:s|min)?)/i);
      const weight = text.match(/(\d+(?:\.\d+)?)\s*kg/i);
      return {
        sets: setsReps ? Number(setsReps[1]) : null,
        reps: setsReps ? setsReps[2] : "",
        weight: weight ? weight[1] : ""
      };
    }

    function dayState(day, dateKey, today) {
      const blocks = Object.values(day.blocks);
      const statuses = blocks.map(b => b.status);
      const allComplete = statuses.length > 0 && statuses.every(s => s === "complete");
      const anySaved = statuses.some(s => s && s !== "pending");
      const isRest = "rest" in day.blocks;
      if (allComplete) return "completed";
      if (anySaved) return "partial";
      if (dateKey === today) return "today";
      if (isRest) return "rest";
      if (dateKey < today) return "missed";
      return "pending";
    }

    function computeKPIs(plan, config) {
      const dayKeys = Object.keys(plan.days);
      let trainingDone = 0;
      let trainingDays = 0;
      const kneeAfter = [];
      const backAfter = [];
      for (const k of dayKeys) {
        const d = plan.days[k];
        const isRest = "rest" in d.blocks;
        if (!isRest) {
          trainingDays++;
          let total = 0, done = 0;
          for (const b of Object.values(d.blocks)) {
            for (const ex of b.exercises) {
              if (ex.custom) continue;
              total++;
              if (ex.completed) done++;
            }
          }
          if (total > 0 && done / total >= 0.85) trainingDone++;
        }
        if (d.pain?.knee_after != null) kneeAfter.push(Number(d.pain.knee_after));
        if (d.pain?.back_after != null) backAfter.push(Number(d.pain.back_after));
      }
      const avg = (arr) => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : "—";
      return {
        training: trainingDone + "/" + trainingDays,
        macros: computeMacrosWeekKPI(plan, config),
        kneePain: avg(kneeAfter),
        backPain: avg(backAfter)
      };
    }

    function weekProgressPct(plan) {
      let totalEx = 0, doneEx = 0;
      for (const k of Object.keys(plan.days)) {
        for (const b of Object.values(plan.days[k].blocks)) {
          for (const ex of b.exercises) {
            if (ex.custom) continue;
            totalEx++;
            if (ex.completed) doneEx++;
          }
        }
      }
      return totalEx ? Math.round(100 * doneEx / totalEx) : 0;
    }

    function formatLog(log) {
      if (!log) return null;
      const parts = [];
      if (log.sets != null) parts.push(log.sets + "×");
      if (log.reps) parts[parts.length-1] = (parts[parts.length-1] || "") + log.reps;
      if (!parts.length && log.reps) parts.push(log.reps);
      if (log.weight) parts.push("@ " + log.weight + "kg");
      if (log.rpe != null) parts.push("RPE " + log.rpe);
      return parts.join(" ");
    }

        if (!open) return;
        if (isNew) {
          setForm(blank);
        } else if (exercise) {
          const log = exercise.log || {};
          setForm({
            name: exercise.name || "",
            category: exercise.category || "cuadriceps_hsr",
            sets: log.sets ?? null,
            reps: log.reps ?? "",
            weight: log.weight ?? "",
            rpe: log.rpe ?? null,
            notes: log.notes ?? ""
          });
        }
      }, [open, exercise, isNew]);

      if (!open) return null;

      const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const canSave = form.name.trim().length > 0;

      const save = () => {
        if (!canSave) return;
        const log = {
          sets: form.sets === "" || form.sets == null ? null : Number(form.sets),
          reps: (form.reps || "").toString().trim(),
          weight: (form.weight || "").toString().trim(),
          rpe: form.rpe === "" || form.rpe == null ? null : Number(form.rpe),
          notes: (form.notes || "").toString().trim()
        };
        const anyLog = log.sets != null || log.reps || log.weight || log.rpe != null || log.notes;
        onSave({
          name: form.name.trim(),
          category: form.category,
          log: anyLog ? log : null
        });
      };

                  value={form.category}

    function ProfileSettings({ config, onSave }) {
      const [expanded, setExpanded] = useState(false);
      const [form, setForm] = useState(() => structuredClone(config));
      const [justSaved, setJustSaved] = useState(false);

      useEffect(() => { setForm(structuredClone(config)); }, [config]);

      const dirty = useMemo(
        () => JSON.stringify(form) !== JSON.stringify(config),
        [form, config]
      );

      const setProfileField = (key, value) => {
        setForm(f => ({ ...f, profile: { ...f.profile, [key]: value } }));
      };
      const setDiagField = (part, key, value) => {
        setForm(f => ({ ...f, diagnoses: { ...f.diagnoses, [part]: { ...f.diagnoses[part], [key]: value } } }));
      };

      const save = async () => {
        const next = structuredClone(form);
        // Filter empty lines in diagnoses arrays
        for (const part of Object.keys(next.diagnoses)) {
          const d = next.diagnoses[part];
          if (Array.isArray(d.conditions)) d.conditions = d.conditions.filter(s => s && s.trim());
          if (Array.isArray(d.normal)) d.normal = d.normal.filter(s => s && s.trim());
        }
        await onSave(next);
        setJustSaved(true);
        setTimeout(() => setJustSaved(false), 2000);
      };

      const p = form.profile || {};
      const kneeCount = (config.diagnoses?.knee_right?.conditions || []).length;
      const lumbarCount = (config.diagnoses?.lumbar?.conditions || []).length;
      const previewBits = [
        p.age ? p.age + "a" : null,
        p.weight_kg ? p.weight_kg + "kg" : null,
        p.height_cm ? p.height_cm + "cm" : null,
        (kneeCount + lumbarCount) > 0 ? (kneeCount + lumbarCount) + " dx" : null
      ].filter(Boolean).join(" · ");

      const numField = (label, key, min, max, step = 1) => (
        <div className="flex flex-col">
          <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400 mb-0.5">{label}</label>
          <input
            type="number"
            inputMode="decimal"
            min={min} max={max} step={step}
            value={p[key] ?? ""}
            onChange={(e) => {
              const v = e.target.value;
              setProfileField(key, v === "" ? null : Number(v));
            }}
            className="w-full h-10 text-center tabular-nums text-base rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900"
            placeholder="—"
          />
        </div>
      );

      const diagCard = (part, title) => {
        const d = form.diagnoses?.[part] || { conditions: [], normal: [], date: null };
        const toText = (arr) => Array.isArray(arr) ? arr.join("\n") : "";
        const fromText = (text) => text.split("\n").map(s => s);
        return (
          <div className="rounded-xl border border-gray-200 dark:border-gray-800 p-3 bg-white dark:bg-gray-900 space-y-2">
            <div className="flex items-center justify-between gap-2">
              <div className="text-xs font-medium text-gray-700 dark:text-gray-300">{title}</div>
              <input
                type="date"
                value={d.date || ""}
                onChange={(e) => setDiagField(part, "date", e.target.value || null)}
                className="text-xs tabular-nums rounded border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-2 py-1"
              />
            </div>
            <div>
              <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400">Condiciones (una por línea)</label>
              <textarea
                rows={3}
                value={toText(d.conditions)}
                onChange={(e) => setDiagField(part, "conditions", fromText(e.target.value))}
                className="w-full text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-2 py-1.5 mt-1 leading-snug"
                placeholder="ej. Condromalacia rotuliana grado II"
              />
            </div>
            <div>
              <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400">Hallazgos normales</label>
              <textarea
                rows={2}
                value={toText(d.normal)}
                onChange={(e) => setDiagField(part, "normal", fromText(e.target.value))}
                className="w-full text-xs rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-2 py-1.5 mt-1 leading-snug"
                placeholder="ej. Meniscos, LCA, LCP"
              />
            </div>
          </div>
        );
      };

      return (
        <div className="px-4 pt-1 pb-3">
          <div className="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 overflow-hidden">
            <button
              onClick={() => setExpanded(v => !v)}
              className="w-full flex items-center justify-between gap-2 p-3 min-h-[56px] active:bg-gray-50 dark:active:bg-gray-800"
            >
              <div className="flex items-center gap-2 min-w-0">
                <svg className="w-4 h-4 text-gray-500 dark:text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                <div className="flex flex-col items-start min-w-0">
                  <div className="text-sm font-medium text-gray-900 dark:text-gray-100">Perfil & diagnósticos</div>
                  {previewBits && <div className="text-[11px] text-gray-500 dark:text-gray-400 truncate">{previewBits}</div>}
                </div>
              </div>
              <svg className={"w-4 h-4 text-gray-400 transition-transform flex-shrink-0 " + (expanded ? "rotate-180" : "")} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7" /></svg>
            </button>

            {expanded && (
              <div className="px-3 pb-3 border-t border-gray-100 dark:border-gray-800 space-y-3 pt-3">
                {/* Perfil */}
                <div className="rounded-xl border border-gray-200 dark:border-gray-800 p-3 bg-white dark:bg-gray-900">
                  <div className="text-xs font-medium text-gray-700 dark:text-gray-300 mb-2">Perfil</div>
                  <div className="space-y-2">
                    <div>
                      <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400 mb-0.5 block">Nombre</label>
                      <input
                        type="text"
                        value={p.name || ""}
                        onChange={(e) => setProfileField("name", e.target.value)}
                        className="w-full h-10 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-3"
                        placeholder="Opcional"
                      />
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      {numField("Edad", "age", 1, 120, 1)}
                      {numField("Años entreno", "training_years", 0, 60, 1)}
                      {numField("Peso (kg)", "weight_kg", 30, 200, 0.1)}
                      {numField("Altura (cm)", "height_cm", 100, 250, 1)}
                      {numField("% grasa actual", "body_fat_pct", 5, 50, 0.1)}
                      {numField("% grasa objetivo", "target_fat_pct", 5, 50, 0.1)}
                      {numField("Proteína diaria (g)", "protein_daily_g", 50, 300, 1)}
                      {numField("Ajuste kcal/día", "goal_kcal_adjustment", -1000, 1000, 25)}
                    </div>
                    {(() => {
                      const m = mifflinStJeor(p);
                      const adj = Number(p.goal_kcal_adjustment ?? -350);
                      const sedBase = Math.round(m.bmr * 1.2);
                      const label = adj < 0 ? "Déficit" : adj > 0 ? "Superávit" : "Mantenimiento";
                      return (
                        <div className="mt-2 rounded-lg bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-800 px-2.5 py-2 text-[11px] text-gray-700 dark:text-gray-300 leading-snug">
                          <div className="font-medium">{label} · BMR {m.bmr} kcal</div>
                          <div className="text-gray-500 dark:text-gray-400 mt-0.5">
                            Día sin datos de Apple Watch: <span className="tabular-nums font-medium text-gray-700 dark:text-gray-300">{sedBase + adj} kcal</span> meta.
                            Día con activas: <span className="tabular-nums font-medium text-gray-700 dark:text-gray-300">BMR + activas {adj >= 0 ? "+" : ""}{adj}</span>.
                          </div>
                          <div className="text-gray-500 dark:text-gray-400 mt-1">Sugerencias: <button type="button" onClick={() => setProfileField("goal_kcal_adjustment", -350)} className="underline">-350 déficit</button> · <button type="button" onClick={() => setProfileField("goal_kcal_adjustment", 0)} className="underline">0 mantener</button> · <button type="button" onClick={() => setProfileField("goal_kcal_adjustment", 300)} className="underline">+300 volumen</button></div>
                        </div>
                      );
                    })()}
                  </div>
                </div>

                {/* Diagnósticos */}
                {diagCard("knee_right", "Rodilla derecha")}
                {diagCard("lumbar", "Lumbar")}

                {/* Save */}
                <div>
                  <button
                    onClick={save}
                    disabled={!dirty}
                    className={"w-full min-h-[44px] rounded-xl text-sm font-medium transition " + (dirty ? "bg-emerald-600 text-white active:bg-emerald-700" : "bg-gray-100 text-gray-400 dark:bg-gray-800 dark:text-gray-600")}
                  >
                    {justSaved ? "✓ Guardado" : "Guardar cambios"}
                  </button>
                  <div className="text-[10px] text-gray-500 dark:text-gray-400 text-center mt-1.5">
                    Estos datos quedan solo en tu dispositivo.
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function MacroProgress({ label, value, target, unit, color }) {
      const pct = target > 0 ? Math.min(100, Math.round(100 * value / target)) : 0;
      const colorCls = {
        emerald: "bg-emerald-500",
        purple: "bg-purple-500",
        blue: "bg-blue-500"
      }[color] || "bg-emerald-500";
      return (
        <div className="rounded-xl border border-gray-200 dark:border-gray-800 p-3 bg-white dark:bg-gray-900">
          <div className="flex items-baseline justify-between mb-1.5">
            <span className="text-[10px] uppercase tracking-wide text-gray-500 dark:text-gray-400">{label}</span>
            <span className="text-xs tabular-nums text-gray-500 dark:text-gray-400">{pct}%</span>
          </div>
          <div className="text-base font-semibold tabular-nums">
            {Math.round(value)}<span className="text-xs font-normal text-gray-500 dark:text-gray-400"> / {target} {unit}</span>
          </div>
          <div className="h-1.5 w-full bg-gray-100 dark:bg-gray-800 rounded-full overflow-hidden mt-2">
            <div className={"h-full transition-all " + colorCls} style={{ width: pct + "%" }} />
          </div>
        </div>
      );
    }

    function nowHHMM() {
      const d = new Date();
      return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
    }

    function MealInput({ onSave }) {
      const [description, setDescription] = useState("");
      const [loading, setLoading] = useState(false);
      const [draft, setDraft] = useState(null);  // pending confirmation
      const [error, setError] = useState(null);

      const estimate = async () => {
        const d = description.trim();
        if (!d) return;
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(WORKER_URL + "/api/macros", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ description: d })
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || "error_api");
          }
          setDraft({
            time: nowHHMM(),
            description: d,
            parsed_name: data.parsed_name || d.slice(0, 40),
            calories: Number(data.calories) || 0,
            protein_g: Number(data.protein_g) || 0,
            carbs_g: Number(data.carbs_g) || 0,
            fat_g: Number(data.fat_g) || 0,
            estimated_by_ai: true
          });
        } catch (e) {
          setError(e.message || "Error de red");
          // Fallback: open draft for manual entry
          setDraft({
            time: nowHHMM(),
            description: d,
            parsed_name: d.slice(0, 40),
            calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0,
            estimated_by_ai: false
          });
        } finally {
          setLoading(false);
        }
      };

      const confirm = () => {
        onSave(draft);
        setDraft(null);
        setDescription("");
        setError(null);
      };
      const cancel = () => { setDraft(null); setError(null); };

      const updateDraft = (k, v) => setDraft(d => ({ ...d, [k]: v }));

      return (
        <div className="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-3 space-y-2">
          <div className="text-xs font-medium text-gray-700 dark:text-gray-300">Agregar comida</div>
          {!draft ? (
            <>
              <textarea
                rows={2}
                value={description}
                onChange={(e) => setDescription(e.target.value)}
                disabled={loading}
                className="w-full text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-3 py-2 leading-snug disabled:opacity-50"
                placeholder="ej. 200g pollo a la plancha con arroz y ensalada"
              />
              <button
                onClick={estimate}
                disabled={loading || !description.trim()}
                className={"w-full min-h-[44px] rounded-xl text-sm font-medium " + (description.trim() && !loading ? "bg-purple-600 text-white active:bg-purple-700" : "bg-gray-100 text-gray-400 dark:bg-gray-800 dark:text-gray-600")}
              >
                {loading ? (
                  <span className="inline-flex items-center gap-2">
                    <svg className="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
                    Estimando con IA…
                  </span>
                ) : "Estimar macros con IA"}
              </button>
            </>
          ) : (
            <div className="space-y-2">
              {error && <div className="text-[11px] text-red-700 dark:text-red-400 rounded-lg bg-red-50 dark:bg-red-950/40 border border-red-200 dark:border-red-900 px-2 py-1.5">⚠ {error} — ajustá los valores manualmente.</div>}
              {!error && <div className="text-[11px] text-emerald-700 dark:text-emerald-400">✓ IA estimó los macros. Ajustá si hace falta y confirmá.</div>}

              <div className="grid grid-cols-[1fr,auto] gap-2">
                <input
                  type="text"
                  value={draft.parsed_name}
                  onChange={(e) => updateDraft("parsed_name", e.target.value)}
                  className="h-10 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-3"
                  placeholder="Nombre corto"
                />
                <input
                  type="time"
                  value={draft.time}
                  onChange={(e) => updateDraft("time", e.target.value)}
                  className="h-10 text-sm tabular-nums rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-2 w-[100px]"
                />
              </div>

              <div className="grid grid-cols-4 gap-1.5">
                {["calories","protein_g","carbs_g","fat_g"].map(k => (
                  <div key={k} className="flex flex-col">
                    <label className="text-[9px] uppercase text-gray-500 dark:text-gray-400 mb-0.5">{ {calories:"Cal",protein_g:"Prot",carbs_g:"Carb",fat_g:"Grasa"}[k] }</label>
                    <input
                      type="number"
                      inputMode="numeric"
                      min="0"
                      value={draft[k]}
                      onChange={(e) => updateDraft(k, e.target.value === "" ? 0 : Number(e.target.value))}
                      className="h-9 text-center tabular-nums text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900"
                    />
                  </div>
                ))}
              </div>

              <div className="flex gap-2">
                <button onClick={cancel} className="flex-1 min-h-[40px] rounded-xl border border-gray-300 dark:border-gray-700 text-sm text-gray-700 dark:text-gray-300 active:bg-gray-100 dark:active:bg-gray-800">Cancelar</button>
                <button onClick={confirm} className="flex-1 min-h-[40px] rounded-xl bg-emerald-600 text-white text-sm font-medium active:bg-emerald-700">Guardar comida</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function MealEditor({ open, meal, onSave, onClose }) {
      const blank = { time: nowHHMM(), parsed_name: "", calories: 0, protein_g: 0, carbs_g: 0, fat_g: 0, notes: "" };
      const [form, setForm] = useState(blank);

      useEffect(() => {
        if (open && meal) setForm({
          time: meal.time || nowHHMM(),
          parsed_name: meal.parsed_name || meal.description || "",
          calories: meal.calories || 0,
          protein_g: meal.protein_g || 0,
          carbs_g: meal.carbs_g || 0,
          fat_g: meal.fat_g || 0,
          notes: meal.notes || ""
        });
      }, [open, meal]);

      if (!open || !meal) return null;
      const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const save = () => {
        onSave(meal.id, {
          time: form.time,
          parsed_name: form.parsed_name.trim() || (meal.description || "").slice(0, 40),
          calories: Number(form.calories) || 0,
          protein_g: Number(form.protein_g) || 0,
          carbs_g: Number(form.carbs_g) || 0,
          fat_g: Number(form.fat_g) || 0,
          notes: form.notes.trim(),
          estimated_by_ai: meal.estimated_by_ai && form.parsed_name === meal.parsed_name &&
            form.calories === meal.calories && form.protein_g === meal.protein_g &&
            form.carbs_g === meal.carbs_g && form.fat_g === meal.fat_g
        });
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/50 backdrop-blur-sm" onClick={onClose}>
          <div
            onClick={(e) => e.stopPropagation()}
            className="w-full max-w-[480px] bg-white dark:bg-gray-900 rounded-t-2xl max-h-[92vh] overflow-y-auto shadow-xl"
            style={{ paddingBottom: "env(safe-area-inset-bottom)" }}
          >
            <div className="sticky top-0 bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 px-4 py-3 flex items-center justify-between">
              <h3 className="text-sm font-semibold">Editar comida</h3>
              <button onClick={onClose} className="p-1.5 -m-1.5 text-gray-500 dark:text-gray-400">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
              </button>
            </div>
            <div className="p-4 space-y-3">
              <div className="grid grid-cols-[1fr,auto] gap-2">
                <div>
                  <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400 mb-0.5 block">Nombre</label>
                  <input
                    type="text"
                    value={form.parsed_name}
                    onChange={(e) => setField("parsed_name", e.target.value)}
                    className="w-full h-10 text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-3"
                  />
                </div>
                <div>
                  <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400 mb-0.5 block">Hora</label>
                  <input
                    type="time"
                    value={form.time}
                    onChange={(e) => setField("time", e.target.value)}
                    className="w-[110px] h-10 text-sm tabular-nums rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-2"
                  />
                </div>
              </div>

              <div className="grid grid-cols-4 gap-1.5">
                {["calories","protein_g","carbs_g","fat_g"].map(k => (
                  <div key={k} className="flex flex-col">
                    <label className="text-[9px] uppercase text-gray-500 dark:text-gray-400 mb-0.5">{ {calories:"Cal",protein_g:"Prot",carbs_g:"Carb",fat_g:"Grasa"}[k] }</label>
                    <input
                      type="number"
                      inputMode="numeric"
                      min="0"
                      value={form[k]}
                      onChange={(e) => setField(k, e.target.value === "" ? 0 : Number(e.target.value))}
                      className="h-10 text-center tabular-nums text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900"
                    />
                  </div>
                ))}
              </div>

              <div>
                <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400 mb-0.5 block">Notas (opcional)</label>
                <textarea
                  rows={2}
                  value={form.notes}
                  onChange={(e) => setField("notes", e.target.value)}
                  className="w-full text-sm rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 px-3 py-2 leading-snug"
                />
              </div>

              <div className="flex gap-2">
                <button onClick={onClose} className="flex-1 min-h-[44px] rounded-xl border border-gray-300 dark:border-gray-700 text-sm font-medium text-gray-700 dark:text-gray-300 active:bg-gray-100 dark:active:bg-gray-800">Cancelar</button>
                <button onClick={save} className="flex-1 min-h-[44px] rounded-xl bg-emerald-600 text-white text-sm font-medium active:bg-emerald-700">Guardar</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function MealLog({ meals, onEdit, onDelete }) {
      if (!meals || meals.length === 0) {
        return (
          <div className="rounded-xl border border-dashed border-gray-200 dark:border-gray-800 p-6 text-center text-xs text-gray-500 dark:text-gray-400">
            Sin comidas registradas hoy.
          </div>
        );
      }
      const sorted = [...meals].sort((a, b) => (a.time || "").localeCompare(b.time || ""));
      return (
        <div className="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 overflow-hidden">
          <div className="divide-y divide-gray-100 dark:divide-gray-800">
            {sorted.map(m => (
              <div key={m.id} className="flex items-start gap-2 p-3">
                <span className="text-[11px] tabular-nums text-gray-500 dark:text-gray-400 font-medium w-11 flex-shrink-0 mt-0.5">{m.time}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-sm text-gray-900 dark:text-gray-100 truncate">{m.parsed_name || m.description}</div>
                  <div className="text-[11px] text-gray-500 dark:text-gray-400 tabular-nums mt-0.5">
                    {Math.round(m.calories)} cal · {Math.round(m.protein_g)}p · {Math.round(m.carbs_g)}c · {Math.round(m.fat_g)}g
                    {m.estimated_by_ai && <span className="ml-1 text-purple-500">· IA</span>}
                  </div>
                </div>
                <button
                  onClick={() => onEdit(m)}
                  aria-label="Editar"
                  className="p-2 -m-1 text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 flex-shrink-0"
                >
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                </button>
                <button
                  onClick={() => { if (confirm("¿Eliminar esta comida?")) onDelete(m.id); }}
                  aria-label="Eliminar"
                  className="p-2 -m-1 text-gray-400 hover:text-red-600 dark:hover:text-red-400 flex-shrink-0"
                >
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M8 7V4a1 1 0 011-1h6a1 1 0 011 1v3" /></svg>
                </button>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MovementInput({ movement, onChange }) {
      const [showSteps, setShowSteps] = useState(() => movement.steps != null && movement.steps !== "");
      return (
        <div className="rounded-xl border border-gray-200 dark:border-gray-800 bg-white dark:bg-gray-900 p-3">
          <div className="text-xs font-medium text-gray-700 dark:text-gray-300 mb-2">Movimiento del día</div>
          <div className="flex flex-col">
            <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400 mb-0.5">
              ⚡ Kcal activas <span className="text-gray-400 normal-case">(del Apple Watch — ajusta tu meta del día)</span>
            </label>
            <input
              type="number"
              inputMode="numeric"
              min="0"
              value={movement.active_kcal ?? ""}
              onChange={(e) => onChange("active_kcal", e.target.value === "" ? null : Number(e.target.value))}
              className="w-full h-10 text-center tabular-nums text-base rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900"
              placeholder="—"
            />
          </div>
          {showSteps ? (
            <div className="flex flex-col mt-2">
              <label className="text-[10px] uppercase text-gray-500 dark:text-gray-400 mb-0.5">
                👣 Pasos <span className="text-gray-400 normal-case">(opcional)</span>
              </label>
              <input
                type="number"
                inputMode="numeric"
                min="0"
                value={movement.steps ?? ""}
                onChange={(e) => onChange("steps", e.target.value === "" ? null : Number(e.target.value))}
                className="w-full h-10 text-center tabular-nums text-base rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900"
                placeholder="—"
              />
            </div>
          ) : (
            <button
              onClick={() => setShowSteps(true)}
              className="text-[11px] text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 mt-2"
            >+ Agregar pasos (opcional)</button>
          )}
        </div>
      );
    }

    function NutritionTab({ plan, config, selectedDate, onSelectDay, onAddMeal, onEditMeal, onDeleteMeal, onMovementChange }) {
      const today = todayIso();
      const day = plan.days[selectedDate];
      if (!day) return null;
      ensureNutrition(day);

      const totals = sumMealsDay(day);
      const targetInfo = computeDayTarget(config?.profile, day);
      const targetCal = targetInfo.target;
      const targetProt = Number(config?.profile?.protein_daily_g) || 160;

      return (
        <div className="px-4 py-3 space-y-3">
          <div className="-mx-4 px-4 overflow-x-auto scrollbar-hide">
            <div className="flex gap-2 pb-1">
              {Object.entries(plan.days).map(([dateKey, d]) => (
                <DayChip
                  key={dateKey}
                  dateKey={dateKey}
                  day={d}
                  state={dayState(d, dateKey, today)}
                  selected={dateKey === selectedDate}
                  onClick={() => onSelectDay(dateKey)}
                />
              ))}
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2">
            <MacroProgress label="Calorías" value={totals.calories} target={targetCal} unit="kcal" color="emerald" />
            <MacroProgress label="Proteína" value={totals.protein_g} target={targetProt} unit="g" color="purple" />
          </div>
          <div className="text-[10px] text-gray-500 dark:text-gray-400 -mt-1 px-1">
            {targetInfo.hasActive
              ? <>BMR {targetInfo.bmr} + activas {targetInfo.active} {targetInfo.adjust >= 0 ? "+" : ""}{targetInfo.adjust} = {targetInfo.target} kcal meta</>
              : <>BMR {targetInfo.bmr} × 1.2 {targetInfo.adjust >= 0 ? "+" : ""}{targetInfo.adjust} = {targetInfo.target} kcal meta (ingresá kcal activas para ajustar)</>}
          </div>

          <div className="grid grid-cols-2 gap-2 text-center">
            <div className="rounded-xl border border-gray-200 dark:border-gray-800 p-2 bg-white dark:bg-gray-900">
              <div className="text-[10px] uppercase tracking-wide text-gray-500 dark:text-gray-400">Carbs</div>
              <div className="text-sm font-semibold tabular-nums mt-0.5">{Math.round(totals.carbs_g)} <span className="text-[10px] font-normal text-gray-500 dark:text-gray-400">g</span></div>
            </div>
            <div className="rounded-xl border border-gray-200 dark:border-gray-800 p-2 bg-white dark:bg-gray-900">
              <div className="text-[10px] uppercase tracking-wide text-gray-500 dark:text-gray-400">Grasa</div>
              <div className="text-sm font-semibold tabular-nums mt-0.5">{Math.round(totals.fat_g)} <span className="text-[10px] font-normal text-gray-500 dark:text-gray-400">g</span></div>
            </div>
          </div>

          <MealInput onSave={onAddMeal} />

          <div>
            <div className="text-xs font-medium text-gray-700 dark:text-gray-300 mb-1.5">
              Comidas del día <span className="text-gray-500 dark:text-gray-400">({day.nutrition.meals.length})</span>
            </div>
            <MealLog meals={day.nutrition.meals} onEdit={onEditMeal} onDelete={onDeleteMeal} />
          </div>

          <MovementInput movement={day.nutrition.movement} onChange={onMovementChange} />
        </div>
      );
    }

    // -------------------- APP --------------------
    function App() {
      const [loaded, setLoaded] = useState(false);
      const [config, setConfig] = useState(null);
      const [plan, setPlan] = useState(null);
      const [activeTab, setActiveTab] = useState("entreno");
      const [selectedDate, setSelectedDate] = useState(null);

      // Load on mount
      useEffect(() => {
        (async () => {
          let c = await window.storage.get("config");
          let p = await window.storage.get("active-plan");
          let h = await window.storage.get("history");
          if (!c) { c = DEFAULT_CONFIG; await window.storage.set("config", c); }
          if (!p) { p = DEFAULT_PLAN; await window.storage.set("active-plan", p); }
          else if (migratePlanDates(p)) { await window.storage.set("active-plan", p); }
          if (!h) { h = DEFAULT_HISTORY; await window.storage.set("history", h); }
          setConfig(c);
          setPlan(p);
          // Default selected day: today if in plan, else start_date
          const today = todayIso();
          setSelectedDate(p.days[today] ? today : p.start_date);
          setLoaded(true);
        })();
      }, []);

      const persistPlan = useCallback(async (next) => {
        setPlan(next);
        await window.storage.set("active-plan", next);
      }, []);

      const toggleExercise = useCallback((blockKey, exId) => {
        setPlan(prev => {
          const next = structuredClone(prev);
          const block = next.days[selectedDate].blocks[blockKey];
          const ex = block.exercises.find(e => e.id === exId);
          ex.completed = !ex.completed;
          window.storage.set("active-plan", next);
          return next;
        });
      }, [selectedDate]);

      const saveBlock = useCallback((blockKey) => {
        const next = structuredClone(plan);
        const block = next.days[selectedDate].blocks[blockKey];
        block.status = calcBlockStatus(block);
        block.saved_at = new Date().toISOString();
        persistPlan(next);
      }, [plan, selectedDate, persistPlan]);

      const painChange = useCallback((key, value) => {
        const next = structuredClone(plan);
        next.days[selectedDate].pain[key] = value;
        persistPlan(next);
      }, [plan, selectedDate, persistPlan]);

      const saveConfig = useCallback(async (next) => {
        setConfig(next);
        await window.storage.set("config", next);
      }, []);

      // Exercise editor state: { blockKey, exerciseId?, isNew }
      const [editor, setEditor] = useState(null);

      const openEditExercise = useCallback((blockKey, exerciseId) => {
        setEditor({ blockKey, exerciseId, isNew: false });
      }, []);
      const openAddExercise = useCallback((blockKey) => {
        setEditor({ blockKey, exerciseId: null, isNew: true });
      }, []);
      const closeEditor = useCallback(() => setEditor(null), []);

      const saveExercise = useCallback((updates) => {
        if (!editor) return;
        const next = structuredClone(plan);
        const block = next.days[selectedDate].blocks[editor.blockKey];
        if (editor.isNew) {
          block.exercises.push({
            id: "cust-" + Date.now(),
            name: updates.name,
            prescription: "",
            category: updates.category,
            log: updates.log,
            custom: true,
            completed: true
          });
        } else {
          const idx = block.exercises.findIndex(e => e.id === editor.exerciseId);
          if (idx >= 0) {
            const cur = block.exercises[idx];
            const changed = cur.name !== updates.name || cur.category !== updates.category;
            block.exercises[idx] = {
              ...cur,
              name: updates.name,
              category: updates.category,
              log: updates.log,
              modified: cur.modified || (changed && !cur.custom)
            };
          }
        }
        persistPlan(next);
        setEditor(null);
      }, [plan, selectedDate, editor, persistPlan]);

      const deleteExercise = useCallback((blockKey, exerciseId) => {
        const next = structuredClone(plan);
        const block = next.days[selectedDate].blocks[blockKey];
        block.exercises = block.exercises.filter(e => e.id !== exerciseId);
        persistPlan(next);
      }, [plan, selectedDate, persistPlan]);

      const addMeal = useCallback((meal) => {
        const next = structuredClone(plan);
        ensureNutrition(next.days[selectedDate]);
        next.days[selectedDate].nutrition.meals.push({
          id: "meal-" + Date.now(),
          saved_at: new Date().toISOString(),
          ...meal
        });
        persistPlan(next);
      }, [plan, selectedDate, persistPlan]);

      const deleteMeal = useCallback((mealId) => {
        const next = structuredClone(plan);
        ensureNutrition(next.days[selectedDate]);
        next.days[selectedDate].nutrition.meals = next.days[selectedDate].nutrition.meals.filter(m => m.id !== mealId);
        persistPlan(next);
      }, [plan, selectedDate, persistPlan]);

      const [editingMealId, setEditingMealId] = useState(null);
      const openEditMeal = useCallback((meal) => setEditingMealId(meal.id), []);
      const closeEditMeal = useCallback(() => setEditingMealId(null), []);

      const saveEditedMeal = useCallback((mealId, updates) => {
        const next = structuredClone(plan);
        ensureNutrition(next.days[selectedDate]);
        const idx = next.days[selectedDate].nutrition.meals.findIndex(m => m.id === mealId);
        if (idx >= 0) {
          next.days[selectedDate].nutrition.meals[idx] = {
            ...next.days[selectedDate].nutrition.meals[idx],
            ...updates
          };
        }
        persistPlan(next);
        setEditingMealId(null);
      }, [plan, selectedDate, persistPlan]);

      const changeMovement = useCallback((key, value) => {
        const next = structuredClone(plan);
        ensureNutrition(next.days[selectedDate]);
        next.days[selectedDate].nutrition.movement[key] = value;
        persistPlan(next);
      }, [plan, selectedDate, persistPlan]);

      if (!loaded) {
        return <div className="p-8 text-center text-sm text-gray-500">Cargando…</div>;
      }

      const kpis = computeKPIs(plan, config);
      const progress = weekProgressPct(plan);

      return (
        <div className="max-w-[480px] mx-auto pb-10">
          <Header plan={plan} kpis={kpis} progress={progress} />
          <ChatBar />
          <TabBar active={activeTab} onChange={setActiveTab} />

          {activeTab === "entreno" ? (
            <>
              <DayPlan
                plan={plan}
                selectedDate={selectedDate}
                onSelectDay={setSelectedDate}
                onToggleExercise={toggleExercise}
                onSaveBlock={saveBlock}
                onPainChange={painChange}
                onEditExercise={openEditExercise}
                onAddExercise={openAddExercise}
                onDeleteExercise={deleteExercise}
              />
              <WeekSummary plan={plan} />
              <Timeline config={config} />
              <ProfileSettings config={config} onSave={saveConfig} />
              <ResetFooter onReset={async () => {
                if (confirm("¿Borrar todos los datos y empezar de cero?")) {
                  await window.storage.delete("config");
                  await window.storage.delete("active-plan");
                  await window.storage.delete("history");
                  location.reload();
                }
              }} />
            </>
          ) : (
            <NutritionTab
              plan={plan}
              config={config}
              selectedDate={selectedDate}
              onSelectDay={setSelectedDate}
              onAddMeal={addMeal}
              onEditMeal={openEditMeal}
              onDeleteMeal={deleteMeal}
              onMovementChange={changeMovement}
            />
          )}

          <ExerciseEditor
            open={!!editor}
            isNew={!!editor?.isNew}
            exercise={editor && !editor.isNew ? plan.days[selectedDate].blocks[editor.blockKey].exercises.find(e => e.id === editor.exerciseId) : null}
            originalPrescription={editor && !editor.isNew ? plan.days[selectedDate].blocks[editor.blockKey].exercises.find(e => e.id === editor.exerciseId)?.prescription : null}
            onSave={saveExercise}
            onClose={closeEditor}
          />

          <MealEditor
            open={!!editingMealId}
            meal={editingMealId ? (plan.days[selectedDate]?.nutrition?.meals || []).find(m => m.id === editingMealId) : null}
            onSave={saveEditedMeal}
            onClose={closeEditMeal}
          />
        </div>
      );
    }

    function ResetFooter({ onReset }) {
      return (
        <div className="px-4 pt-2 pb-6">
          <button
            onClick={onReset}
            className="w-full min-h-[36px] text-[11px] text-gray-400 dark:text-gray-600 hover:text-red-600 dark:hover:text-red-400"
          >Reiniciar datos</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
